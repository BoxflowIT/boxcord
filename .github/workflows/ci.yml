name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─── Unit & Integration Tests ───────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: boxcord
          POSTGRES_PASSWORD: boxcord
          POSTGRES_DB: boxcord_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Generate Prisma Client
        run: yarn prisma:generate

      - name: Run database migrations
        run: yarn prisma:migrate-deploy
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test

      - name: TypeScript check
        run: yarn typecheck

      - name: Lint backend
        run: yarn lint

      - name: Run backend tests
        run: yarn test
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-only
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
          COGNITO_REGION: eu-north-1
          BOXTIME_API_URL: http://localhost:3000
          VAPID_PUBLIC_KEY: test-key
          VAPID_PRIVATE_KEY: test-key
          VAPID_SUBJECT: mailto:test@test.com

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Client TypeScript check
        working-directory: ./client
        run: yarn tsc --noEmit

      - name: Lint client
        working-directory: ./client
        run: yarn lint

      - name: Run client tests
        working-directory: ./client
        run: yarn test

      - name: Build client
        working-directory: ./client
        run: yarn build

  # ─── Desktop TypeScript Check ──────────────────────────────────────
  desktop-typecheck:
    name: Desktop Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: ./desktop
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        working-directory: ./desktop
        run: yarn typecheck

  # ─── E2E Tests (Playwright) ────────────────────────────────────────
  # Runs only tests that don't require Cognito auth (tagged @auth).
  # Auth-dependent tests are skipped in CI until auth mocking is added.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: boxcord
          POSTGRES_PASSWORD: boxcord
          POSTGRES_DB: boxcord_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Generate Prisma Client
        run: yarn prisma:generate

      - name: Run database migrations
        run: yarn prisma:migrate-deploy
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e

      - name: Seed test database
        run: yarn seed
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e
          NODE_ENV: test

      - name: Build backend
        run: yarn tsc

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build client
        working-directory: ./client
        run: yarn build

      - name: Install serve for static file serving
        run: npm install -g serve

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: yarn test:e2e --project=chromium --grep-invert @auth
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: test-secret-key-for-ci-only
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
          COGNITO_REGION: eu-north-1
          BOXTIME_API_URL: http://localhost:3000
          VAPID_PUBLIC_KEY: BF2LnmjFO_1LwVcn1xudIMdUrPAk9ifOw5_UiyoSva863uK5a0tuSRCqItg4P-rXI5QXt64fqJVsbJCJjIyi38M
          VAPID_PRIVATE_KEY: ZkKePsvRO5XGTBBU0_S4drCLwnpVYaPomOOfmKwgJaI
          VAPID_SUBJECT: mailto:test@test.com
          FRONTEND_URL: http://localhost:5173
          BACKEND_URL: http://localhost:3001
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─── Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run yarn audit (fail on high/critical only)
        run: |
          EXIT_CODE=0
          yarn audit --level high || EXIT_CODE=$?
          if [ $EXIT_CODE -ge 8 ]; then exit 1; fi

      - name: Run client yarn audit (fail on high/critical only)
        working-directory: ./client
        run: |
          EXIT_CODE=0
          yarn audit --level high || EXIT_CODE=$?
          if [ $EXIT_CODE -ge 8 ]; then exit 1; fi
