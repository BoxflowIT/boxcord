name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: boxcord
          POSTGRES_PASSWORD: boxcord
          POSTGRES_DB: boxcord_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test

      - name: Lint backend
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run backend tests
        run: npm test
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-only
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
          COGNITO_REGION: eu-north-1
          BOXTIME_API_URL: http://localhost:3000
          VAPID_PUBLIC_KEY: test-key
          VAPID_PRIVATE_KEY: test-key
          VAPID_SUBJECT: mailto:test@test.com

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      - name: Run client tests
        working-directory: ./client
        run: npm test

      - name: Build client
        working-directory: ./client
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

      - name: Run client npm audit
        working-directory: ./client
        run: npm audit --production --audit-level=moderate
        continue-on-error: true
