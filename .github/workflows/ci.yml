name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_PREFIX: /opt/homebrew

jobs:
  # ─── Unit & Integration Tests ───────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          export PATH="$HOMEBREW_PREFIX/bin:$PATH"
          brew list postgresql@16 &>/dev/null || brew install postgresql@16
          export PATH="$(brew --prefix postgresql@16)/bin:$PATH"
          brew services start postgresql@16
          for i in $(seq 1 30); do pg_isready -q && break; sleep 1; done
          if ! pg_isready -q; then
            echo "PostgreSQL did not become ready in time." >&2
            exit 1
          fi
          psql postgres <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'boxcord') THEN
              CREATE ROLE boxcord LOGIN;
            END IF;
          END
          $$;
          ALTER ROLE boxcord WITH LOGIN NOSUPERUSER CREATEDB PASSWORD 'boxcord';
          SQL
          psql postgres -c "DROP DATABASE IF EXISTS boxcord_test;"
          psql postgres -c "CREATE DATABASE boxcord_test OWNER boxcord;"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Generate Prisma Client
        run: yarn prisma:generate

      - name: Run database migrations
        run: yarn prisma:migrate-deploy
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test

      - name: TypeScript check
        run: yarn typecheck

      - name: Lint backend
        run: yarn lint

      - name: Run backend tests
        run: yarn test
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-only
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
          COGNITO_REGION: eu-north-1
          BOXTIME_API_URL: http://localhost:3000
          VAPID_PUBLIC_KEY: test-key
          VAPID_PRIVATE_KEY: test-key
          VAPID_SUBJECT: mailto:test@test.com

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Client TypeScript check
        working-directory: ./client
        run: yarn tsc --noEmit

      - name: Lint client
        working-directory: ./client
        run: yarn lint

      - name: Run client tests
        working-directory: ./client
        run: yarn test

      - name: Build client
        working-directory: ./client
        run: yarn build

  # ─── Desktop TypeScript Check ──────────────────────────────────────
  desktop-typecheck:
    name: Desktop Typecheck
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ./desktop
        run: yarn install --frozen-lockfile

      - name: TypeScript check
        working-directory: ./desktop
        run: yarn typecheck

  # ─── E2E Tests (Playwright) ────────────────────────────────────────
  # Runs only tests that don't require Cognito auth (tagged @auth).
  # Auth-dependent tests are skipped in CI until auth mocking is added.
  e2e:
    name: E2E Tests
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          export PATH="$HOMEBREW_PREFIX/bin:$PATH"
          brew list postgresql@16 &>/dev/null || brew install postgresql@16
          export PATH="$(brew --prefix postgresql@16)/bin:$PATH"
          brew services start postgresql@16
          for i in $(seq 1 30); do pg_isready -q && break; sleep 1; done
          if ! pg_isready -q; then
            echo "PostgreSQL did not become ready in time." >&2
            exit 1
          fi
          psql postgres <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'boxcord') THEN
              CREATE ROLE boxcord LOGIN;
            END IF;
          END
          $$;
          ALTER ROLE boxcord WITH LOGIN NOSUPERUSER CREATEDB PASSWORD 'boxcord';
          SQL
          psql postgres -c "DROP DATABASE IF EXISTS boxcord_e2e;"
          psql postgres -c "CREATE DATABASE boxcord_e2e OWNER boxcord;"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Generate Prisma Client
        run: yarn prisma:generate

      - name: Run database migrations
        run: yarn prisma:migrate-deploy
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e

      - name: Seed test database
        run: yarn seed
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e
          NODE_ENV: test

      - name: Build backend
        run: yarn tsc

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build client
        working-directory: ./client
        run: yarn build

      - name: Install serve for static file serving
        run: npm install -g serve

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        # install-deps may fail on macOS (designed for Linux apt); non-fatal on macOS
        run: npx playwright install-deps chromium || echo '⚠️ install-deps not supported on this OS — skipping'

      - name: Run E2E tests
        run: yarn test:e2e --project=chromium --grep-invert @auth
        env:
          DATABASE_URL: postgresql://boxcord:boxcord@localhost:5432/boxcord_e2e
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: test-secret-key-for-ci-only
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
          COGNITO_REGION: eu-north-1
          BOXTIME_API_URL: http://localhost:3000
          VAPID_PUBLIC_KEY: BF2LnmjFO_1LwVcn1xudIMdUrPAk9ifOw5_UiyoSva863uK5a0tuSRCqItg4P-rXI5QXt64fqJVsbJCJjIyi38M
          VAPID_PRIVATE_KEY: ZkKePsvRO5XGTBBU0_S4drCLwnpVYaPomOOfmKwgJaI
          VAPID_SUBJECT: mailto:test@test.com
          FRONTEND_URL: http://localhost:5173
          BACKEND_URL: http://localhost:3001
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─── Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit (fail on high/critical only)
        # NOTE: yarn audit API returns HTTP 410 (deprecated/shutdown by yarnpkg.com).
        # We generate a temporary package-lock.json for npm audit instead.
        # The audited graph may slightly differ from yarn.lock but is the best
        # available option until the project migrates to a newer package manager.
        run: |
          trap 'rm -f package-lock.json' EXIT
          npm i --package-lock-only --ignore-scripts
          set +e
          npm audit --audit-level=high 2>&1
          AUDIT_EXIT=$?
          set -e
          if [ "$AUDIT_EXIT" -ne 0 ]; then
            # Check if only known prisma/effect transitive vulnerabilities remain
            UNKNOWN_VULNS=$(npm audit --audit-level=high --json 2>/dev/null | node -e '
              const data = JSON.parse(require("fs").readFileSync("/dev/stdin","utf8"));
              const vulns = data.vulnerabilities || {};
              const known = new Set(["effect","@prisma/config","prisma"]);
              const unknown = Object.entries(vulns).filter(([k,v]) => !known.has(k) && (v.severity==="high"||v.severity==="critical"));
              console.log(unknown.length);
            ' 2>/dev/null || echo "unknown")
            if [ "$UNKNOWN_VULNS" = "0" ]; then
              echo "⚠️  Only known Prisma/effect transitive vulnerabilities found (build-time only) — passing"
            else
              echo "::error::npm audit found high/critical vulnerabilities"
              npm audit --audit-level=high 2>&1 || true
              exit 1
            fi
          fi
          echo "✅ Root audit passed"

      - name: Run client npm audit (fail on high/critical only)
        working-directory: ./client
        run: |
          trap 'rm -f package-lock.json' EXIT
          npm i --package-lock-only --ignore-scripts
          npm audit --audit-level=high
          echo "✅ No high/critical client vulnerabilities found"
