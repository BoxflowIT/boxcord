name: Deploy to Staging

on:
  push:
    branches: [develop]

# Only one staging deploy at a time
concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only deploy if CI passed (ci.yml runs on develop push too)
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Staging)
        run: railway up --service "${{ vars.RAILWAY_STAGING_SERVICE_ID }}" --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: sleep 30

      - name: Smoke test staging
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"
          echo "🔍 Running smoke tests against $STAGING_URL..."

          # Health check
          echo "→ Health check..."
          HEALTH=$(curl -sf "$STAGING_URL/health" || echo "FAILED")
          if echo "$HEALTH" | grep -q "ok"; then
            echo "  ✅ Health check passed"
          else
            echo "  ❌ Health check failed: $HEALTH"
            exit 1
          fi

          # API reachable
          echo "→ API reachable..."
          API_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/api/v1" || echo "000")
          if [ "$API_STATUS" -ge 200 ] && [ "$API_STATUS" -lt 500 ]; then
            echo "  ✅ API reachable (HTTP $API_STATUS)"
          else
            echo "  ❌ API unreachable (HTTP $API_STATUS)"
            exit 1
          fi

          echo ""
          echo "✅ Staging smoke tests passed!"

      - name: Post deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Staging Deploy Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Deploy Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** develop" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
