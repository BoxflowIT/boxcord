name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: 'staging'
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AWS credentials
        id: check
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "⚠️ AWS_DEPLOY_ROLE_ARN not configured — skipping staging deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        if: steps.check.outputs.skip != 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push backend image ────────────────────────────────
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME_STAGING }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME_STAGING }}:latest
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging

      - name: Deploy backend to ECS (staging)
        if: steps.check.outputs.skip != 'true'
        run: |
          # Get current task definition and update image
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_STAGING }} \
            --query 'taskDefinition' --output json)

          NEW_IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME_STAGING }}:${{ github.sha }}"

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_NAME_STAGING }} \
            --service ${{ vars.ECS_SERVICE_NAME_STAGING }} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      # ── Build & deploy frontend ───────────────────────────────────
      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Build client
        if: steps.check.outputs.skip != 'true'
        run: |
          cd client && yarn install --frozen-lockfile --ignore-engines && yarn build

      - name: Deploy frontend to S3 (staging)
        if: steps.check.outputs.skip != 'true'
        run: |
          aws s3 sync client/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME_STAGING }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_STAGING }} \
            --paths "/*"

      # ── Smoke test ────────────────────────────────────────────────
      - name: Wait for deployment
        if: steps.check.outputs.skip != 'true'
        run: sleep 30

      - name: Smoke test staging
        if: steps.check.outputs.skip != 'true'
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"
          echo "🔍 Running smoke tests against $STAGING_URL..."
          echo "→ Health check..."
          HEALTH=$(curl -sf "$STAGING_URL/health" || echo "FAILED")
          if echo "$HEALTH" | grep -q "ok\|healthy"; then
            echo "  ✅ Health check passed"
          else
            echo "  ❌ Health check failed: $HEALTH"
            exit 1
          fi
          echo "→ API reachable..."
          API_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
          if [ "$API_STATUS" -ge 200 ] && [ "$API_STATUS" -lt 500 ]; then
            echo "  ✅ API reachable (HTTP $API_STATUS)"
          else
            echo "  ❌ API unreachable (HTTP $API_STATUS)"
            exit 1
          fi
          echo ""
          echo "✅ Staging smoke tests passed!"

      - name: Post deploy status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Staging Deploy Successful (AWS)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Deploy Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** develop" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
