name: Deploy Preview

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Deploy Preview
    runs-on: [self-hosted]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && !github.event.pull_request.head.repo.fork
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check AWS credentials
        id: check
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "⚠️ AWS credentials not configured — skipping deploy preview"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Build client
        if: steps.check.outputs.skip != 'true'
        run: |
          cd client && yarn install --frozen-lockfile --ignore-engines && yarn build

      - name: Configure AWS credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Deploy preview frontend to S3
        id: deploy
        if: steps.check.outputs.skip != 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PREVIEW_PREFIX="previews/pr-${PR_NUM}"
          aws s3 sync client/dist/ "s3://${{ vars.FRONTEND_BUCKET_NAME_STAGING }}/${PREVIEW_PREFIX}/" \
            --delete \
            --cache-control "public, max-age=0, must-revalidate"
          echo "✅ Preview deployed to: ${PREVIEW_PREFIX}"

      - name: Comment preview URL on PR
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const stagingUrl = '${{ vars.STAGING_URL }}';
            const previewPath = `previews/pr-${prNumber}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Deploy Preview')
            );

            const body = `## 🚀 Deploy Preview

` +
              `| Status | Path | Commit |
` +
              `|--------|------|---------|
` +
              `| ✅ Deployed | \`${previewPath}\` | \`${sha}\` |

` +
              `> Preview frontend uses staging backend.
` +
              `> Preview will be cleaned up when this PR is closed.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  cleanup:
    name: Cleanup Preview
    runs-on: [self-hosted]
    if: github.event.action == 'closed'

    steps:
      - name: Configure AWS credentials
        id: check
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1
        continue-on-error: true

      - name: Remove preview files from S3
        if: steps.check.outcome == 'success'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          echo "🧹 Cleaning up preview for PR #${PR_NUM}"
          aws s3 rm "s3://${{ vars.FRONTEND_BUCKET_NAME_STAGING }}/previews/pr-${PR_NUM}/" \
            --recursive 2>/dev/null || echo "Preview already removed"
