name: Deploy Preview

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, closed]

# Cancel previous preview deploys for same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy preview to Railway
        id: deploy
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          ENV_NAME="pr-${PR_NUM}"

          # Create or use existing PR environment
          railway environment create "$ENV_NAME" 2>/dev/null || true

          # Deploy to the PR environment
          railway up \
            --service "${{ vars.RAILWAY_STAGING_SERVICE_ID }}" \
            --environment "$ENV_NAME" \
            --detach

          echo "✅ Deployed to environment: $ENV_NAME"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Deploy Preview')
            );

            const body = `## 🚀 Deploy Preview\n\n` +
              `| Status | Environment | Commit |\n` +
              `|--------|-------------|-----------|\n` +
              `| ✅ Deployed | \`pr-${prNumber}\` | \`${sha}\` |\n\n` +
              `> Preview will be cleaned up when this PR is closed.\n` +
              `> Check Railway dashboard for the preview URL.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  # Cleanup preview environments when PRs are closed
  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Remove Railway preview environment
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          echo "🧹 Cleaning up preview for PR #${PR_NUM}"
          railway environment delete "pr-${PR_NUM}" --yes 2>/dev/null || echo "Environment already removed"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
