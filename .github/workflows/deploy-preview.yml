name: Deploy Preview

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

# Cancel previous preview deploys for same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # Only create previews for PRs to develop (not direct-to-main)
    if: github.base_ref == 'develop'
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build
        run: yarn build

      # Railway PR environments (requires Railway Pro or Team plan)
      # If Railway PR environments aren't available, this creates a
      # temporary environment using the Railway CLI
      - name: Deploy preview to Railway
        id: deploy
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ vars.RAILWAY_STAGING_SERVICE_ID }}
        env:
          RAILWAY_ENVIRONMENT: pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Deploy Preview')
            );

            const body = `## 🚀 Deploy Preview\n\n` +
              `| Status | URL | Commit |\n` +
              `|--------|-----|--------|\n` +
              `| ✅ Ready | [Preview Link](${{ steps.deploy.outputs.url || 'https://railway.app' }}) | \`${sha}\` |\n\n` +
              `> This preview will be automatically removed when the PR is closed.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  # Cleanup preview environments when PRs are closed
  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Remove Railway preview environment
        run: |
          echo "🧹 Cleaning up preview for PR #${{ github.event.pull_request.number }}"
          # Railway automatically cleans up PR environments
          # Add manual cleanup here if needed
