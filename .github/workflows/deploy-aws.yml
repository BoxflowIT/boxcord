name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.pr-number'
      - '.github/workflows/version-bump.yml'
  workflow_dispatch:

concurrency:
  group: aws-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Build & Push Docker Image ──────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        run: |
          ECR_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}"
          SHA_TAG="${ECR_URI}:${GITHUB_SHA::8}"
          LATEST_TAG="${ECR_URI}:latest"
          echo "tags=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy Frontend to S3/CloudFront ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build client
        working-directory: ./client
        run: yarn build
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync client/dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "changelog.json" \
            --exclude "desktop-updates/*"

          # index.html, sw.js and changelog.json should not be cached aggressively
          aws s3 cp client/dist/index.html s3://${{ vars.FRONTEND_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

          aws s3 cp client/dist/sw.js s3://${{ vars.FRONTEND_BUCKET_NAME }}/sw.js \
            --cache-control "public, max-age=0, must-revalidate"

          aws s3 cp client/dist/changelog.json s3://${{ vars.FRONTEND_BUCKET_NAME }}/changelog.json \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/sw.js" "/changelog.json"

  # ─── Update ECS Service ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: [self-hosted, macOS, ARM64]
    needs: build-backend

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Update ECS task definition with new image
        id: update-task
        run: |
          echo "🚀 Updating ECS task definition..."

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY }} \
            --query 'taskDefinition' --output json)

          # Update image and inject Microsoft 365 env vars
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "${{ needs.build-backend.outputs.image_tag }}" \
            --arg MS_CID "${{ vars.MS_CLIENT_ID }}" \
            --arg MS_SEC "${{ secrets.MS_CLIENT_SECRET }}" \
            --arg MS_TID "${{ vars.MS_TENANT_ID }}" \
            '
            .containerDefinitions[0].image = $IMAGE |
            # Upsert Microsoft env vars
            (.containerDefinitions[0].environment // []) as $env |
            .containerDefinitions[0].environment = (
              [$env[] | select(.name != "MS_CLIENT_ID" and .name != "MS_CLIENT_SECRET" and .name != "MS_TENANT_ID")] +
              [{"name":"MS_CLIENT_ID","value":$MS_CID},{"name":"MS_CLIENT_SECRET","value":$MS_SEC},{"name":"MS_TENANT_ID","value":$MS_TID}]
            ) |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            ')

          # Register new task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_arn=${NEW_ARN}" >> $GITHUB_OUTPUT
          echo "✅ New task definition: $NEW_ARN"

      - name: Deploy to ECS
        run: |
          echo "🚀 Updating ECS service..."
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --service ${{ vars.ECS_SERVICE_NAME }} \
            --task-definition ${{ steps.update-task.outputs.task_arn }} \
            --force-new-deployment \
            --query 'service.serviceName' --output text

          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER_NAME }} \
            --services ${{ vars.ECS_SERVICE_NAME }} \
            || echo "⚠️ Wait timed out — check ECS console"

      - name: Verify deployment
        run: |
          echo "🔍 Checking health via ALB..."
          ALB_URL="${{ vars.ALB_DNS_NAME }}"
          for i in 1 2 3 4 5; do
            HEALTH=$(curl -sf --max-time 10 "http://${ALB_URL}/health" 2>&1 || echo "RETRY")
            if echo "$HEALTH" | grep -q "ok\|healthy"; then
              echo "✅ Backend healthy!"
              exit 0
            fi
            echo "  Attempt $i — retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ─── Post-Deploy Summary ────────────────────────────────────────
  summary:
    name: Deploy Summary
    runs-on: [self-hosted, macOS, ARM64]
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Create summary
        run: |
          if [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "## ✅ AWS Deployment Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ AWS Deployment Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (ECS Fargate) | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (S3/CloudFront) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
