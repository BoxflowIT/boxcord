name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '*.md'
      - '.pr-number'

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version on Main
    runs-on: [self-hosted, macOS, ARM64]
    # Skip if commit message already contains version bump
    if: "!contains(github.event.head_commit.message, 'bump version')"

    steps:
      - name: Validate required tools
        run: |
          command -v jq >/dev/null 2>&1
          command -v gh >/dev/null 2>&1

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Current version: $CURRENT_VERSION"

      - name: Determine version bump type
        id: bump_type
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Get commits since last tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          echo "Commits since last tag:"
          echo "$COMMITS"

          # Determine bump type based on conventional commits
          BUMP_TYPE="patch"

          # Check for breaking changes (major bump)
          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP_TYPE="major"
            echo "🔴 Found BREAKING CHANGE - will bump MAJOR version"
          # Check for new features (minor bump)
          elif echo "$COMMITS" | grep -qE "^(✨ )?feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
            echo "✨ Found feat commits - will bump MINOR version"
          # Check for fixes (patch bump)
          elif echo "$COMMITS" | grep -qE "^(🐛 )?fix(\(.+\))?:"; then
            BUMP_TYPE="patch"
            echo "🐛 Found fix commits - will bump PATCH version"
          # Check for other commit types
          elif echo "$COMMITS" | grep -qE "^(♻️ |📝 |🔧 |⚡ |💄 |🧪 )?(refactor|docs|chore|perf|style|test)(\(.+\))?:"; then
            BUMP_TYPE="patch"
            echo "🔧 Found other commits - will bump PATCH version"
          # Merge commits
          elif echo "$COMMITS" | grep -qE "^(🔀 )?merge:"; then
            BUMP_TYPE="minor"
            echo "🔀 Found merge commits - will bump MINOR version"
          else
            BUMP_TYPE="patch"
            echo "📦 Default - will bump PATCH version"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Bump version
        id: new_version
        run: |
          BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"

          # Bump root package.json
          npm version $BUMP_TYPE --no-git-tag-version

          # Bump client package.json
          cd client
          npm version $BUMP_TYPE --no-git-tag-version
          cd ..

          # Bump desktop package.json
          cd desktop
          npm version $BUMP_TYPE --no-git-tag-version
          cd ..

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Bumped version to: $NEW_VERSION"

      - name: Generate changelog
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            RANGE="${LATEST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Collect feat/fix commits, strip emoji prefix, type prefix, scope, and PR number
          NOTES=$(git log "$RANGE" --pretty=format:"%s" \
            | grep -iE "^(✨ |🐛 )?(feat|fix)(\(.+\))?:" \
            | sed -E 's/^[^ ]+ //' \
            | sed -E 's/^(feat|fix)(\([^)]*\))?:\s*//' \
            | sed -E 's/\s*\(#[0-9]+\)\s*$//' \
            | sed -E 's/^\s+//;s/\s+$//' \
            | grep -v '^$' || true)

          if [ -z "$NOTES" ]; then
            echo "ℹ️ No feat/fix commits found — skipping changelog update"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            TODAY=$(date +%Y-%m-%d)
            # Build JSON array of notes
            NOTES_JSON=$(echo "$NOTES" | jq -R -s 'split("\n") | map(select(length > 0)) | map((.[0:1] | ascii_upcase) + .[1:])')

            # Build new entry
            NEW_ENTRY=$(jq -n \
              --arg version "$NEW_VERSION" \
              --arg date "$TODAY" \
              --argjson notes "$NOTES_JSON" \
              '{version: $version, date: $date, notes: {en: $notes}}')

            # Prepend to existing changelog
            EXISTING=$(cat client/public/changelog.json)
            echo "$EXISTING" | jq --argjson entry "$NEW_ENTRY" '[$entry] + .' > client/public/changelog.json

            echo "✅ Added changelog entry for v$NEW_VERSION:"
            echo "$NOTES"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        id: changelog

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          git add package.json client/package.json desktop/package.json client/public/changelog.json
          git commit -m "🔖 chore: auto bump version to $NEW_VERSION [skip ci]"

          # Create or update git tag (force-replace if it already exists)
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "⚠️ Tag v$NEW_VERSION already exists, force-updating it"
            git tag -d "v$NEW_VERSION"
            git push origin --delete "v$NEW_VERSION" 2>/dev/null || true
          fi
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"

          echo "✅ Created commit and tag v$NEW_VERSION"

      - name: Push changes
        run: |
          git push origin main --follow-tags
          echo "✅ Pushed to main with tags"

      - name: Check for desktop-relevant changes
        id: desktop_changes
        run: |
          # Use the tag before the one we just created (HEAD^ is the pre-bump commit)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "${PREV_TAG}..HEAD^" -- desktop/ client/ package.json)
          else
            CHANGED="force"
          fi
          if [ -n "$CHANGED" ]; then
            echo "trigger=true" >> $GITHUB_OUTPUT
            echo "📱 Desktop-relevant changes found — will trigger release"
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
            echo "⏭️ No desktop-relevant changes — skipping release"
          fi

      - name: Trigger desktop release
        if: steps.desktop_changes.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run "Desktop Release" \
            -f version="${{ steps.new_version.outputs.version }}"
          echo "✅ Triggered desktop-release.yml for v${{ steps.new_version.outputs.version }}"

      - name: Summary
        env:
          OLD_VERSION: ${{ steps.current_version.outputs.version }}
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
          BUMP_TYPE: ${{ steps.bump_type.outputs.bump_type }}
        run: |
          echo "## 🎉 Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Old Version:** $OLD_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **New Version:** $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type:** $BUMP_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **Git Tag:** v$NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Version automatically bumped and pushed to main!" >> $GITHUB_STEP_SUMMARY
