name: Desktop Release

# Trigger: push a tag like  git tag desktop-v1.13.0 && git push origin desktop-v1.13.0
on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write # needed to create/update GitHub Releases

env:
  # Production URL loaded by the Electron app
  BOXCORD_URL: https://chat.boxflow.se

jobs:
  # ─── Create GitHub Release first ───────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Boxcord Desktop v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Linux ──────────────────────────────────────────────────────────
  release-linux:
    name: Linux (AppImage + deb)
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build & publish Linux packages
        working-directory: desktop
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows ────────────────────────────────────────────────────────
  release-windows:
    name: Windows (NSIS installer)
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build & publish Windows installer
        working-directory: desktop
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS ──────────────────────────────────────────────────────────
  release-mac:
    name: macOS (DMG)
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build & publish macOS DMG
        working-directory: desktop
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned for now — needs Developer ID Application cert from Account Holder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  # ─── Publish Release ────────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [release-linux, release-windows, release-mac]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> $GITHUB_OUTPUT

      - name: Publish release (remove draft)
        run: gh release edit "v${{ steps.version.outputs.version }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
