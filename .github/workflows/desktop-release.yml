name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.19.2)'
        required: true
        type: string

permissions:
  contents: write # needed to create/update GitHub Releases
  id-token: write # needed to assume AWS role for S3 upload

env:
  # Production URL loaded by the Electron app
  BOXCORD_URL: https://boxcord.boxflow.com
  # Resolve version: workflow_dispatch input takes priority, otherwise extract from tag
  RELEASE_VERSION: ${{ inputs.version || '' }}

jobs:
  # ─── Create GitHub Release first ───────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#desktop-v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=desktop-v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Resolved version: $VERSION"

      - name: Ensure desktop tag exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Desktop release v${{ steps.version.outputs.version }}"
            git push origin "$TAG"
            echo "✅ Created tag $TAG"
          else
            echo "✅ Tag $TAG already exists"
          fi

      - name: Create draft GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "Boxcord Desktop v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Linux ──────────────────────────────────────────────────────────
  release-linux:
    name: Linux (AppImage + deb + rpm + pacman)
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install system dependencies for rpm/pacman builds
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build Linux packages
        working-directory: desktop
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts to release
        working-directory: desktop/out
        run: gh release upload "${{ needs.create-release.outputs.tag }}" *.AppImage *.deb *.rpm *.pkg.tar.zst latest-linux.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Upload update files to S3
        working-directory: desktop/out
        run: |
          # Binaries — immutable cache
          for f in *.AppImage *.deb *.rpm *.pkg.tar.zst; do
            aws s3 cp "$f" "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/$f" \
              --cache-control "public, max-age=31536000, immutable"
          done
          # Manifest — short cache so clients see new versions quickly
          aws s3 cp latest-linux.yml "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/latest-linux.yml" \
            --cache-control "public, max-age=300, must-revalidate"

  # ─── Windows ────────────────────────────────────────────────────────
  release-windows:
    name: Windows (NSIS installer)
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build Windows installer
        working-directory: desktop
        run: npx electron-builder --win --publish never

      - name: Upload artifacts to release
        working-directory: desktop/out
        run: gh release upload "${{ needs.create-release.outputs.tag }}" *.exe *.exe.blockmap latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Upload update files to S3
        working-directory: desktop/out
        shell: bash
        run: |
          # Binaries — immutable cache
          for f in *.exe *.exe.blockmap; do
            aws s3 cp "$f" "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/$f" \
              --cache-control "public, max-age=31536000, immutable"
          done
          # Manifest — short cache so clients see new versions quickly
          aws s3 cp latest.yml "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/latest.yml" \
            --cache-control "public, max-age=300, must-revalidate"

  # ─── macOS ──────────────────────────────────────────────────────────
  release-mac:
    name: macOS (DMG)
    needs: create-release
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: desktop/yarn.lock

      - name: Install dependencies
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        working-directory: desktop
        run: yarn build

      - name: Build macOS DMG
        working-directory: desktop
        run: npx electron-builder --mac --publish never
        env:
          # Unsigned for now — needs Developer ID Application cert from Account Holder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts to release
        working-directory: desktop/out
        run: gh release upload "${{ needs.create-release.outputs.tag }}" *.dmg *.dmg.blockmap latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Upload update files to S3
        working-directory: desktop/out
        run: |
          # Binaries — immutable cache
          for f in *.dmg *.dmg.blockmap; do
            aws s3 cp "$f" "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/$f" \
              --cache-control "public, max-age=31536000, immutable"
          done
          # Manifest — short cache so clients see new versions quickly
          aws s3 cp latest-mac.yml "s3://${{ vars.FRONTEND_BUCKET_NAME }}/desktop-updates/latest-mac.yml" \
            --cache-control "public, max-age=300, must-revalidate"

  # ─── Publish Release ────────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [create-release, release-linux, release-windows, release-mac]
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release (remove draft)
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Invalidate CloudFront cache for update manifests
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/desktop-updates/latest.yml" "/desktop-updates/latest-linux.yml" "/desktop-updates/latest-mac.yml"
