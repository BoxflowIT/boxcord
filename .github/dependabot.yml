version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Prisma 7 introduces breaking schema changes (datasource url moved to
      # prisma.config.ts). Stay on 6.x until we plan the migration.
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      - dependency-name: "@prisma/client"
        update-types: [version-update:semver-major]
      # Zod 4 introduces breaking API changes (ZodError.errors -> .issues,
      # default-overloads changed, stricter inferred types). Stay on 3.x
      # until we plan the migration.
      - dependency-name: zod
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
