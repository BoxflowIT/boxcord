version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: boxcord-db
    environment:
      POSTGRES_USER: boxcord
      POSTGRES_PASSWORD: boxcord
      POSTGRES_DB: boxcord
    ports:
      - "5433:5432"
    volumes:
      - boxcord-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxcord"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Redis for Socket.io scaling (multi-instance)
  redis:
    image: redis:7-alpine
    container_name: boxcord-redis
    ports:
      - "6380:6379"
    volumes:
      - boxcord-redis:/data

volumes:
  boxcord-data:
  boxcord-redis:
