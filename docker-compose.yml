# Local Development Environment
# Run: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: boxcord-db
    environment:
      POSTGRES_USER: boxcord
      POSTGRES_PASSWORD: boxcord
      POSTGRES_DB: boxcord
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - boxcord-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxcord"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: boxcord-redis
    ports:
      - "127.0.0.1:6380:6379"  # Avoid conflict with system Redis
    volumes:
      - boxcord-redis:/data
    command: redis-server --appendonly yes --requirepass boxcord
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "boxcord", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  boxcord-data:
  boxcord-redis:
